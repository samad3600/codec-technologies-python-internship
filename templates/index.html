<!DOCTYPE html>

<html>

<head>

<title>AI Assistant</title>

<link
rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="container">

<h1>
🤖 AI Assistant
</h1>


<button
class="clear"
onclick="clearChat()">

Clear Chat

</button>



<div id="chatbox">

{% for m,r in history %}

<div class="user">

{{m}}

</div>


<div class="bot">

{{r}}

</div>

{% endfor %}

</div>



<div class="input-area">

<input

id="msg"

placeholder="Ask something..."

>


<button

onclick="send()"

>

Send

</button>


</div>

</div>



<script>


async function send(){


let input=

document

.getElementById(

"msg"

)



let msg=

input.value



if(msg==="")

return



let box=

document

.getElementById(

"chatbox"

)



box.innerHTML+=

`

<div class='user'>

${msg}

</div>

`



input.value=""



box.innerHTML+=

`

<div class='bot loading'>

Typing...

</div>

`



box.scrollTop=

box.scrollHeight



let r=

await fetch(

"/chat?msg="+

encodeURIComponent(

msg

)

)



let data=

await r.text()



document

.querySelector(

".loading"

)

.remove()



box.innerHTML+=

`

<div class='bot'>

${data}

</div>

`



box.scrollTop=

box.scrollHeight



input.focus()


}



function clearChat(){

document

.getElementById(

"chatbox"

)

.innerHTML=""

}



document

.getElementById(

"msg"

)

.addEventListener(

"keypress",

function(e){

if(

e.key==="Enter"

)

send()

}

)



window.onload=function(){

document

.getElementById(

"chatbox"

)

.scrollTop=

document

.getElementById(

"chatbox"

)

.scrollHeight

}



document

.getElementById(

"msg"

)

.focus()



</script>


</body>

</html>
